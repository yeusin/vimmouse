name: Build VimLayer.app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VIMLAYER_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build .app bundle
        run: uv run python setup.py py2app

      - name: Upload VimLayer.app
        uses: actions/upload-artifact@v4
        with:
          name: VimLayer.app
          path: dist/VimLayer.app

      - name: Zip app for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r "VimLayer-${VIMLAYER_VERSION}.app.zip" VimLayer.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VimLayer-${{ env.VIMLAYER_VERSION }}.app.zip
          generate_release_notes: true

  prune-artifacts:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      actions: write
    steps:
      - name: Prune old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = artifacts.slice(3);

            for (const artifact of toDelete) {
              console.log(`Deleting artifact ${artifact.id} (${artifact.name}) - created at ${artifact.created_at}`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              } catch (error) {
                console.error(`Failed to delete artifact ${artifact.id}: ${error.message}`);
              }
            }
