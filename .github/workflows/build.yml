name: Build VimMouse.app

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VIMMOUSE_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build .app bundle
        run: uv run python setup.py py2app

      - name: Upload VimMouse.app
        uses: actions/upload-artifact@v4
        with:
          name: VimMouse.app
          path: dist/VimMouse.app

      - name: Zip app for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r VimMouse.app.zip VimMouse.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VimMouse.app.zip
          generate_release_notes: true
