name: Prune Artifacts

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Prune old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Keep the latest 3, delete the rest
            const toDelete = artifacts.slice(3);

            for (const artifact of toDelete) {
              console.log(`Deleting artifact ${artifact.id} (${artifact.name}) - created at ${artifact.created_at}`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              } catch (error) {
                console.error(`Failed to delete artifact ${artifact.id}: ${error.message}`);
              }
            }
